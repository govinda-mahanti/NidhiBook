server {
	listen 80;
	server_name nidhibook.redirectme.net;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	server_name nidhibook.redirectme.net;
	ssl_certificate /etc/letsencrypt/live/nidhibook.redirectme.net/fullchain.pem;	
	ssl_certificate_key /etc/letsencrypt/live/nidhibook.redirectme.net/privkey.pem;

	location / {
    		proxy_pass http://frontend:4173;
    		proxy_http_version 1.1;
    		proxy_set_header Host $host;
	    	proxy_set_header X-Real-IP $remote_addr;
    		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}

	location /api/ {
    		proxy_pass http://backend:5000/;
    		proxy_http_version 1.1;
    		proxy_set_header Host $host;
    		proxy_set_header X-Real-IP $remote_addr;
    		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}
}

